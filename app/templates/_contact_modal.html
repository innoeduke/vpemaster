<div id="contactModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="contactModalTitle"></h2>
    </div>
    <form id="contactForm" method="POST" enctype="multipart/form-data">
      <div class="profile-avatar-section">
        <div class="profile-avatar-container" onclick="navigateToSpeechLogs()">
          <div id="modal-avatar-placeholder" class="avatar-placeholder">
            <i class="fas fa-user"></i>
          </div>
          <img id="modal-avatar-img" src="" alt="Avatar" class="profile-avatar" style="display: none;"
            onerror="this.style.display='none'; document.getElementById('modal-avatar-placeholder').style.display='flex';">
        </div>

        <div class="upload-btn-wrapper">
          <button type="button" class="btn-upload" onclick="document.getElementById('avatar-input').click()">Change
            Photo</button>
          <input type="file" id="avatar-input" name="avatar" accept="image/*" onchange="previewAvatar(this)"
            style="display: none;" />
        </div>
      </div>
      <!-- Tabs Header -->
      <div class="nav-tabs contact-modal-tabs" style="display: none; margin-bottom: 20px;">
        <button type="button" class="nav-item active" id="tab-basic-info" onclick="switchContactTab('basic-info')">Basic Information</button>
        <button type="button" class="nav-item" id="tab-education" onclick="switchContactTab('education')">Education & Awards</button>
      </div>

      <!-- Tab 1 Panel: Basic Information -->
      <div id="panel-basic-info" class="tab-panel">
        <div class="contact-form-grid">
          <input type="hidden" id="type" name="type" value="Guest" />
          <input type="hidden" id="name" name="name" value="" />

          <!-- Row 1: First Name & Last Name -->
          <div class="contact-form-item first-name-column">
            <label for="first_name">First Name: <span class="required-field">*</span></label>
            <input type="text" id="first_name" name="first_name" required />
          </div>
          <div class="contact-form-item last-name-column">
            <label for="last_name">Last Name:</label>
            <input type="text" id="last_name" name="last_name" />
          </div>

          <!-- Row 2: Email & DTM -->
          <div class="contact-form-item email-column">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />
          </div>

          <div class="contact-form-item dtm-item">
            <label for="dtm">DTM:</label>
            <div class="checkbox-box">
              <input type="checkbox" id="dtm" name="dtm" />
            </div>
          </div>

          <!-- Row 3: Phone & Officer -->
          <div class="contact-form-item phone-column">
            <label for="phone_number">Phone:</label>
            <input type="text" id="phone_number" name="phone_number" />
          </div>

          <div class="contact-form-item officer-item">
            <label for="is_officer">Officer:</label>
            <div class="checkbox-box">
              <input type="checkbox" id="is_officer" name="is_officer" {% if not is_authorized(Permissions.CLUBADMIN) %}disabled class="disabled-checkbox"{% endif %} />
            </div>
          </div>

          <!-- Row 4: Member ID & Mentor -->
          <div class="contact-form-item" id="member_id_container" style="display: none;">
            <label for="member_id">Member ID:</label>
            <input type="text" id="member_id" name="member_id" placeholder="Optional" />
          </div>
          <div class="contact-form-item" id="mentor_id_container" style="display: none;">
            <label for="mentor_id">Mentor:</label>
            <select id="mentor_id" name="mentor_id">
              <option value="0">None</option>
              <!-- Populated by JS -->
            </select>
          </div>

          <!-- Row 5: Home Club -->
          <div class="contact-form-item full-width" id="home_club_container" style="display: none;">
            <label for="home_club_id">Home Club:</label>
            <select id="home_club_id" name="home_club_id">
              <!-- Populated by JS -->
            </select>
          </div>

          <!-- Row 5: Bio (Full Width) -->
          <div class="contact-form-item full-width">
            <label for="bio">Bio:</label>
            <textarea id="bio" name="bio" rows="3"></textarea>
          </div>
        </div>
      </div>

      <!-- Tab 2 Panel: Education & Awards -->
      <div id="panel-education" class="tab-panel" style="display: none; padding-top: 15px;">
        <div class="contact-form-grid">
          <!-- Row 1: Registered Paths & Default Path -->
          <div class="contact-form-item">
            <label for="registered_paths">Registered Paths:</label>
            <select id="registered_paths" name="registered_paths" style="font-size: 13px; padding: 10px 8px; background-color: #fff; cursor: pointer;">
                <option value="">No Paths Registered</option>
            </select>
          </div>
          <div class="contact-form-item">
            <label for="current_path">Default Path:</label>
            <input type="text" id="current_path" name="current_path" readonly disabled
              placeholder="Calculated from achievements" style="background-color: #f8f9fa; cursor: not-allowed;" />
          </div>

          <!-- Row 2: Next Project & Credentials -->
          <div class="contact-form-item">
            <label for="next_project">Next Project:</label>
            <input type="text" id="next_project" name="next_project" readonly disabled
              placeholder="Calculated from logs" style="background-color: #f8f9fa; cursor: not-allowed;" />
          </div>
          <div class="contact-form-item">
            <label for="credentials">Credentials:</label>
            <input type="text" id="credentials" name="credentials" readonly disabled
              placeholder="Derived from Achievements" style="background-color: #f8f9fa; cursor: not-allowed;" />
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-speech-cancel" onclick="closeContactModal()">Cancel</button>
        <button type="submit" class="btn btn-speech-save">Save</button>
      </div>
    </form>
  </div>
</div>
