<div id="duplicateContactModal" class="modal" style="z-index: 1005;">
  <div class="modal-content" style="max-width: 480px; border-radius: 12px; overflow: hidden; padding: 0; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);">
    <div style="background: #772432; color: #ffffff; padding: 16px 20px; position: relative; display: flex; align-items: center; justify-content: center;">
        <h2 style="margin: 0; font-size: 1.25rem; color: #ffffff !important; font-weight: 700; display: flex; align-items: center; gap: 8px; line-height: 1.2;"><i class="fas fa-user-friends"></i> Duplicate Found</h2>
        <span class="close" onclick="closeDuplicateModal()" style="color: #ffffff; position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 1.6rem; font-weight: bold; cursor: pointer; opacity: 0.85; transition: opacity 0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.85">&times;</span>
    </div>
    
    <div style="padding: 20px 24px;">
        <p id="duplicateMessage" style="font-size: 0.95rem; color: #444; margin-bottom: 16px; line-height: 1.4; text-align: center;"></p>
        
        <div class="duplicate-details" style="background: #fdf2f4; padding: 16px; border-radius: 8px; border: 1px solid #f5d6da; margin-bottom: 20px;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div style="background: #772432; color: #ffffff; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0;">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <h3 id="dupName" style="margin: 0 0 4px 0; color: #772432; font-size: 1.1rem; font-weight: 700;"></h3>
                    <div style="color: #666; font-size: 0.85rem; line-height: 1.3;">
                        <p style="margin: 2px 0;"><i class="fas fa-envelope fa-fw" style="color: #888;"></i> <span id="dupEmail"></span></p>
                        <p style="margin: 2px 0;"><i class="fas fa-phone fa-fw" style="color: #888;"></i> <span id="dupPhone"></span></p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px;">
            <button type="button" class="btn btn-secondary" onclick="closeDuplicateModal()" style="padding: 8px 16px; font-size: 0.85rem; min-height: 34px;">Cancel</button>
            <button type="button" id="viewDupBtn" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem; min-height: 34px; background: #772432; border-color: #772432;">
                <i class="fas fa-external-link-alt"></i> View Existing Contact
            </button>
        </div>
    </div>
  </div>
</div>
