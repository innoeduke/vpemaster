<div id="waitlistDetailModal" class="modal speech-detail-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Waitlist Entry Details</h3>
            <button class="close-modal-icon" onclick="closeWaitlistDetailModal()" title="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="detail-section">
                <div class="detail-row">
                    <span class="detail-label">Person</span>
                    <div id="waitlist-person-name" class="detail-value text-bold"></div>
                </div>
            </div>
            
            <div id="waitlist-project-container" class="detail-section">
                <div class="detail-row">
                    <span class="detail-label">Project</span>
                    <div class="detail-value">
                        <span id="waitlist-project-code" class="project-code-badge"></span>
                        <span id="waitlist-project-name"></span>
                    </div>
                </div>
            </div>

            <div id="waitlist-title-container" class="detail-section">
                <div class="detail-row">
                    <span class="detail-label">Speech Title</span>
                    <div id="waitlist-speech-title" class="detail-value italic"></div>
                </div>
            </div>

            <div id="waitlist-notes-container" class="detail-section">
                <div class="detail-row">
                    <span class="detail-label">Notes</span>
                    <div id="waitlist-notes" class="detail-value notes-block"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button id="waitlist-message-btn" class="btn btn-primary" onclick="sendWaitlistMessage()">
                <i class="fas fa-comment-alt"></i> <span>Message</span>
            </button>
            <button class="btn btn-secondary" onclick="closeWaitlistDetailModal()">Close</button>
        </div>
    </div>
</div>
