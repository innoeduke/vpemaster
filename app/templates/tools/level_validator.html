{% extends "base.html" %}

{% block title %}Level Validator{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/tools/tools-base.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/tools/tools-desktop.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/tools/tools-ipad.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pages/tools/tools-mobile.css') }}">
{% endblock %}

{% block content %}
<div class="container-fluid mt-4">
    {% include 'tools/_tabs.html' %}

    <div class="level-validator-container">
        <h1 class="page-title"><i class="fas fa-link"></i> Level Validator</h1>
        <p class="page-subtitle">Verify education level completions recorded on the blockchain.</p>

        <div class="validator-card">
            <div class="validator-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="memberId"><i class="fas fa-id-card"></i> Member ID</label>
                        <input type="text" id="memberId" placeholder="PN-12345678" maxlength="12" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="educationPath"><i class="fas fa-road"></i> Education Path</label>
                        <select id="educationPath">
                            <option value="">— Select Path —</option>
                            {% if pathways %}
                            <optgroup label="Active Pathways">
                                {% for p in pathways %}
                                <option value="{{ p }}">{{ p }}</option>
                                {% endfor %}
                            </optgroup>
                            {% endif %}
                            {% if programs %}
                            <optgroup label="Legacy Programs">
                                {% for p in programs %}
                                <option value="{{ p }}">{{ p }}</option>
                                {% endfor %}
                            </optgroup>
                            {% endif %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="levelNumber"><i class="fas fa-layer-group"></i> Level</label>
                        <select id="levelNumber">
                            <option value="">— Level —</option>
                            <option value="1">Level 1</option>
                            <option value="2">Level 2</option>
                            <option value="3">Level 3</option>
                            <option value="4">Level 4</option>
                            <option value="5">Level 5</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button id="verifyBtn" class="btn btn-primary verify-button">
                        <i class="fas fa-search"></i> Verify on Blockchain
                    </button>
                </div>
            </div>
        </div>

        <!-- Result Area -->
        <div id="resultArea" class="result-area" style="display:none;">
            <div id="resultContent"></div>
        </div>
    </div>
</div>
<script src="{{ url_for('static', filename='js/level_validator.js') }}"></script>
{% endblock %}
