{% from "partials/_button_macros.html" import btn %}
<!-- Compose Modal (Brand-aligned: navy #004165, Inter, refined) -->
<div class="compose-modal" id="composeModal">
    <div class="compose-modal-content">
        <div class="compose-header">
            <div>
                <div class="compose-eyebrow">Mailroom</div>
                <h3 class="compose-title">New Message</h3>
            </div>
            <button class="compose-close" onclick="closeComposeModal()" aria-label="Close">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <form id="composeForm" onsubmit="sendMessage(event)" autocomplete="off">
            <div class="compose-body">
                <div class="compose-form-group" style="position: relative;">
                    <label class="compose-label">To</label>
                    <div class="compose-recipient-field" id="recipient_field">
                        <input type="text" id="recipient_search" class="recipient-chip-input" placeholder="Search for a recipient…" autocomplete="off">
                    </div>
                    <div id="recipient_results"></div>
                </div>

                <div class="compose-form-group">
                    <label for="subject" class="compose-label">Subject</label>
                    <input type="text" id="subject" name="subject" class="compose-input" placeholder="Subject" required>
                </div>

                <div class="compose-form-group" style="margin-bottom: 0;">
                    <label for="body" class="compose-label">Message</label>
                    <textarea id="body" name="body" class="compose-textarea" rows="6" placeholder="Write your message…" required></textarea>
                    <span class="compose-char-count" id="char_count">0</span>
                </div>
            </div>

            <div class="compose-footer">
                <span class="compose-footer-hint" id="compose_footer_hint">Add at least one recipient.</span>
                <div class="compose-footer-actions">
                    {% call btn('cancel', attrs={'onclick': 'closeComposeModal()'}) %}Cancel{% endcall %}
                    <button type="submit" class="btn-send">
                        <span>Send</span>
                        <span class="send-arrow"><i class="fas fa-arrow-right"></i></span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>

<script defer src="{{ url_for('static', filename='js/compose_message_modal.js') }}"></script>
