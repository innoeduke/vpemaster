<div id="deleteModal" class="modal"
     data-title-cannot-remove="{{ _('Cannot Remove Yourself') }}"
     data-msg-cannot-remove="{{ _('You cannot remove yourself from the club. Please contact another administrator or the system administrator for assistance.') }}"
     data-btn-ok="{{ _('OK') }}">
    <div class="modal-content">
        <span class="close" onclick="closeDeleteModal()">&times;</span>
        <p id="deleteModalText" style="text-align: center;"></p>
        <form id="deleteForm" method="POST" action="">
            <div class="form-actions" style="justify-content: center; gap: 10px;">
                <button type="button" class="btn btn-secondary" onclick="closeDeleteModal()">Cancel</button>
                <button type="submit" class="btn btn-danger">Delete</button>
            </div>
        </form>
    </div>
</div>
