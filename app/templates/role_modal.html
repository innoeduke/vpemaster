<div id="roleEditModal" class="modal">
  <div class="modal-content">
    <h2 id="role-modal-title">Edit Details</h2>
    <form id="roleEditForm" onsubmit="saveRoleChanges(event)">
      <input type="hidden" id="edit-role-log-id" name="log_id" />
      
      <div class="form-group" style="text-align: left; margin-bottom: 20px;">
        <label class="modal-label" style="font-weight: 700; color: #555; margin-bottom: 5px;">Role:</label>
        <div id="role-name-display" style="font-size: 16px; font-weight: 600; padding: 6px 0; color: #333; border-bottom: 1px solid #eee;"></div>
      </div>

      <!-- Horizontally scrollable container for per-owner cards -->
      <div id="role-owners-scroll" class="role-owners-scroll">
        <!-- Cards are populated dynamically by openRoleEditModal -->
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-speech-cancel" onclick="closeRoleEditModal()">Cancel</button>
        <button type="submit" class="btn btn-speech-save">Save</button>
      </div>
    </form>
  </div>
</div>
