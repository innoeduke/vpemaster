<div id="roleEditModal" class="modal">
  <div class="modal-content">
    <h2 id="role-modal-title">Edit Details</h2>
    <form id="roleEditForm" onsubmit="saveRoleChanges(event)">
      <input type="hidden" id="edit-role-log-id" name="log_id" />
      
      <div class="form-group" style="text-align: left; margin-bottom: 20px;">
        <label class="modal-label" style="font-weight: 700; color: #555; margin-bottom: 5px;">Role:</label>
        <div id="role-name-display" style="font-size: 16px; font-weight: 600; padding: 6px 0; color: #333; border-bottom: 1px solid #eee;"></div>
      </div>

      <div class="form-group" style="text-align: left; margin-bottom: 20px;">
        <label for="edit-role-pathway" class="modal-label" style="font-weight: 700; color: #555; margin-bottom: 5px;">Pathway:</label>
        <select id="edit-role-pathway" name="pathway" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
          <option value="">-- Select Pathway --</option>
        </select>
      </div>

      <div class="form-group" style="text-align: left; margin-bottom: 25px;">
        <label for="edit-role-level" class="modal-label" style="font-weight: 700; color: #555; margin-bottom: 5px;">Level:</label>
        <select id="edit-role-level" name="level" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
          <option value="">-- Select Level --</option>
          <option value="1">Level 1</option>
          <option value="2">Level 2</option>
          <option value="3">Level 3</option>
          <option value="4">Level 4</option>
          <option value="5">Level 5</option>
        </select>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-speech-cancel" onclick="closeRoleEditModal()">Cancel</button>
        <button type="submit" class="btn btn-speech-save">Save</button>
      </div>
    </form>
  </div>
</div>
