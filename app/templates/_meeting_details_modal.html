<div id="meetingDetailsModal" class="modal">
  <div class="modal-content" style="max-width: 800px;">
    <h2>Edit Details</h2>
    
    <style>
        .meeting-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .meeting-details-grid .meta-item {
            display: flex;
            flex-direction: column;
            margin-bottom: 0; /* Override default */
        }
        .meeting-details-grid .meta-item span {
            margin-bottom: 5px;
            color: #555;
        }
        .meeting-details-grid .edit-mode-field {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        /* Make full width for URL */
        .full-width {
            grid-column: 1 / -1;
        }
    </style>

    <div class="meeting-details-grid">
        <div class="meta-item">
            <span><strong>Meeting Number:</strong></span>
            <input type="number"
                   id="edit-meeting-number"
                   class="edit-mode-field"
                   value="{{ selected_meeting.Meeting_Number or '' }}"
                   min="1"
                   step="1"
                   placeholder="Enter a unique number for this meeting">
            <small class="text-muted" style="color: #9ca3af; font-size: 0.75em; margin-top: 4px;">
                Must be a positive integer not already used by another meeting in this club.
            </small>
        </div>
        <div class="meta-item">
            <span><strong>Meeting Title:</strong></span>
            <input type="text"
                   id="edit-meeting-title"
                   class="edit-mode-field"
                   value="{{ selected_meeting.Meeting_Title or '' }}"
                   placeholder="Enter Meeting Title (Theme)">
        </div>
        <div class="meta-item">
            <span><strong>Sub-Title:</strong></span>
            <input type="text" 
                   id="edit-subtitle" 
                   class="edit-mode-field" 
                   value="{{ selected_meeting.Subtitle or '' }}" 
                   placeholder="Enter Meeting Sub-Title">
        </div> 
        <div class="meta-item">
            <span><strong>Meeting Type:</strong></span>
            <select id="edit-meeting-type" class="edit-mode-field">
                <option value="" {% if not selected_meeting.type %}selected{% endif %}>-- Select Type --</option>
                {% for type in meeting_types.keys() %} 
                <option value="{{ type }}" {% if selected_meeting.type == type %}selected{% endif %}>{{ type }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="meta-item">
            <span><strong>Meeting Date:</strong></span>
            <input type="date" 
                   id="edit-meeting-date" 
                   class="edit-mode-field" 
                   value="{{ selected_meeting.Meeting_Date.strftime('%Y-%m-%d') if selected_meeting and selected_meeting.Meeting_Date else '' }}">
        </div>
        <div class="meta-item">
            <span><strong>Word of the Day:</strong></span>
            <input type="text" 
                   id="edit-wod" 
                   class="edit-mode-field" 
                   value="{{ selected_meeting.WOD or '' }}" 
                   placeholder="Enter Word of the Day">
        </div>
        <div class="meta-item">
            <span><strong>Best Speaker:</strong></span>
            <select id="edit-best-speaker" class="edit-mode-field" {% if not selected_meeting or selected_meeting.status != 'finished' %}disabled{% endif %}>
                <option value="">-- Select Best Speaker --</option>
                {% set found_winner = namespace(val=false) %}
                {% for candidate in (voting_candidates['speaker'] if voting_candidates else []) %}
                {% if selected_meeting and selected_meeting.best_speaker_id == candidate.id %}
                    {% set found_winner.val = true %}
                {% endif %}
                <option value="{{ candidate.id }}" {% if selected_meeting and selected_meeting.best_speaker_id == candidate.id %}selected{% endif %}>{{ candidate.name }}</option>
                {% endfor %}
                {% if selected_meeting and selected_meeting.best_speaker_id and not found_winner.val and selected_meeting.best_speaker %}
                <option value="{{ selected_meeting.best_speaker_id }}" selected>{{ selected_meeting.best_speaker.Name }}</option>
                {% endif %}
            </select>
        </div>
        <div class="meta-item">
            <span><strong>Best Evaluator:</strong></span>
            <select id="edit-best-evaluator" class="edit-mode-field" {% if not selected_meeting or selected_meeting.status != 'finished' %}disabled{% endif %}>
                <option value="">-- Select Best Evaluator --</option>
                {% set found_winner = namespace(val=false) %}
                {% for candidate in (voting_candidates['evaluator'] if voting_candidates else []) %}
                {% if selected_meeting and selected_meeting.best_evaluator_id == candidate.id %}
                    {% set found_winner.val = true %}
                {% endif %}
                <option value="{{ candidate.id }}" {% if selected_meeting and selected_meeting.best_evaluator_id == candidate.id %}selected{% endif %}>{{ candidate.name }}</option>
                {% endfor %}
                {% if selected_meeting and selected_meeting.best_evaluator_id and not found_winner.val and selected_meeting.best_evaluator %}
                <option value="{{ selected_meeting.best_evaluator_id }}" selected>{{ selected_meeting.best_evaluator.Name }}</option>
                {% endif %}
            </select>
        </div>
        <div class="meta-item">
            <span><strong>Best Table Topic:</strong></span>
            <select id="edit-best-table-topic" class="edit-mode-field" {% if not selected_meeting or selected_meeting.status != 'finished' %}disabled{% endif %}>
                <option value="">-- Select Best Table Topic --</option>
                {% set found_winner = namespace(val=false) %}
                {% for candidate in (voting_candidates['table-topic'] if voting_candidates else []) %}
                {% if selected_meeting and selected_meeting.best_table_topic_id == candidate.id %}
                    {% set found_winner.val = true %}
                {% endif %}
                <option value="{{ candidate.id }}" {% if selected_meeting and selected_meeting.best_table_topic_id == candidate.id %}selected{% endif %}>{{ candidate.name }}</option>
                {% endfor %}
                {% if selected_meeting and selected_meeting.best_table_topic_id and not found_winner.val and selected_meeting.best_table_topic_speaker %}
                <option value="{{ selected_meeting.best_table_topic_id }}" selected>{{ selected_meeting.best_table_topic_speaker.Name }}</option>
                {% endif %}
            </select>
        </div>
        <div class="meta-item">
            <span><strong>Best Role Taker:</strong></span>
            <select id="edit-best-role-taker" class="edit-mode-field" {% if not selected_meeting or selected_meeting.status != 'finished' %}disabled{% endif %}>
                <option value="">-- Select Best Role Taker --</option>
                {% set found_winner = namespace(val=false) %}
                {% for candidate in (voting_candidates['role-taker'] if voting_candidates else []) %}
                {% if selected_meeting and selected_meeting.best_role_taker_id == candidate.id %}
                    {% set found_winner.val = true %}
                {% endif %}
                <option value="{{ candidate.id }}" {% if selected_meeting and selected_meeting.best_role_taker_id == candidate.id %}selected{% endif %}>{{ candidate.name }}</option>
                {% endfor %}
                {% if selected_meeting and selected_meeting.best_role_taker_id and not found_winner.val and selected_meeting.best_role_taker %}
                <option value="{{ selected_meeting.best_role_taker_id }}" selected>{{ selected_meeting.best_role_taker.Name }}</option>
                {% endif %}
            </select>
        </div>
        <div class="meta-item full-width">
            <span><strong>Media URL:</strong></span>
            <input type="url" 
                   id="edit-media-url" 
                   class="edit-mode-field" 
                   value="{{ selected_meeting.media.url if selected_meeting and selected_meeting.media else '' }}" 
                   placeholder="Enter Meeting Video URL (https://...)">
        </div>
    </div>

    <div class="form-actions">
        <button type="button" class="btn btn-speech-cancel" onclick="closeMeetingDetailsModal()">Cancel</button>
        <button id="save-meeting-details-btn" class="btn btn-speech-save">Save</button>
    </div>
  </div>
</div>
